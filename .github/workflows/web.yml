name: web

on:
  # schedule:
  #   - cron: '*/20 * * * *' # Run every 20 minutes
  workflow_dispatch:
  workflow_run:
    workflows: ["fuzz"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install C3 Compiler
        run: |
          wget https://github.com/c3lang/c3c/releases/download/latest-prerelease-tag/c3-linux.tar.gz
          #wget https://github.com/c3lang/c3c/releases/download/v0.7.11/c3-linux.tar.gz
          tar -xf c3-linux.tar.gz
          echo "$GITHUB_WORKSPACE/c3" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          git clone --depth=1 --branch=v0.25.3 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build Fuzzer
        run: |
          c3c build

      - name: Disable Core Dumps (Fixes CI Timeouts)
        run: |
          sudo sysctl -w kernel.core_pattern=core
          ulimit -c 0

      - name: Create Final Report
        run: |
          ./build/c3fuzz --report

      - name: Commit Findings
        if: always() && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Ensure directories exist so git add doesn't fail if they're empty or missing
          mkdir -p crash segfault timeout old
          git add crash/ segfault/ timeout/ old/
          if ! git diff --cached --quiet; then
            git commit -m "Dashboard: Updated findings (retired/reclassified): $(date +'%Y-%m-%d %H:%M')"
            for i in {1..10}; do
              # Try to pull changes first
              git pull --rebase -X ours --autostash origin master || true
              if git push origin HEAD:master; then
                echo "Successfully pushed findings."
                exit 0
              fi
              echo "Push failed (conflict). Retrying ($i/10)..."
              sleep $((RANDOM % 20 + 5))
            done
            echo "Failed to push findings after 10 attempts."
            exit 1
          else
            echo "No findings were retired or reclassified."
          fi

      - name: Prepare Pages
        run: |
          mkdir -p public
          if [ -f fuzzer_report.html ]; then
            cp fuzzer_report.html public/index.html
          else
            echo "<h1>No findings yet</h1><p>The fuzzer ran but found no reproducible crashes.</p>" > public/index.html
          fi
          cp logo.svg public/logo.svg

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
